<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano Portfolio | Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER (same on every page) -->
  <header class="site-header">
    <div class="container">
      <nav class="navbar" aria-label="Main navigation">
        <a class="brand" href="index.html">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Piano Portfolio</span>
        </a>

        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="gallery.html">Gallery</a>
          <a class="nav-cta" href="contact.html">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- PAGE TITLE -->
  <section class="page-hero">
    <div class="container">
      <h1>Gallery</h1>
      <p class="subtitle">
        A collection of piano moments — practice, performances, and the pieces I love.
      </p>
    </div>
  </section>

  <!-- IMAGE GRID (9+ images) -->
  <section class="section">
    <div class="container">
      <div class="grid gallery-grid">
        <img class="panel" src="images/gallery-1.jpg" alt="Piano gallery image 1 (placeholder)" />
        <img class="panel" src="images/gallery-2.jpg" alt="Piano gallery image 2 (placeholder)" />
        <img class="panel" src="images/gallery-3.jpg" alt="Piano gallery image 3 (placeholder)" />
        <img class="panel" src="images/gallery-4.jpg" alt="Piano gallery image 4 (placeholder)" />
        <img class="panel" src="images/gallery-5.jpg" alt="Piano gallery image 5 (placeholder)" />
        <img class="panel" src="images/gallery-6.jpg" alt="Piano gallery image 6 (placeholder)" />
        <img class="panel" src="images/gallery-7.jpg" alt="Piano gallery image 7 (placeholder)" />
        <img class="panel" src="images/gallery-8.jpg" alt="Piano gallery image 8 (placeholder)" />
        <img class="panel" src="images/gallery-9.jpg" alt="Piano gallery image 9 (placeholder)" />
      </div>
    </div>
  </section>

  <!-- FOOTER (same on every page) -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Piano Portfolio • Built with HTML & CSS</p>
    </div>
  </footer>

</body>
</html>
