
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Piano Portfolio | Contact</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- HEADER (same on every page) -->
  <header class="site-header">
    <div class="container">
      <nav class="navbar" aria-label="Main navigation">
        <a class="brand" href="index.html">
          <span class="brand-badge" aria-hidden="true"></span>
          <span>Piano Portfolio</span>
        </a>

        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="about.html">About</a>
          <a href="gallery.html">Gallery</a>
          <a class="nav-cta" href="contact.html">Contact</a>
        </div>
      </nav>
    </div>
  </header>

  <!-- PAGE TITLE -->
  <section class="page-hero">
    <div class="container">
      <h1>Contact</h1>
      <p class="subtitle">
        Send a message — questions, collaborations, or anything music-related.
      </p>
    </div>
  </section>

  <!-- FORM -->
  <section class="section">
    <div class="container">
      <div class="panel">
        <form action="#" method="post" class="contact-form">
          <div class="grid form-grid">
            <div>
              <label for="name" style="color: var(--text); font-weight: 700;">Name</label><br />
              <input id="name" name="name" type="text" required />
            </div>

            <div>
              <label for="email" style="color: var(--text); font-weight: 700;">Email</label><br />
              <input id="email" name="email" type="email" required />
            </div>

            <div style="grid-column: 1 / -1;">
              <label for="subject" style="color: var(--text); font-weight: 700;">Subject</label><br />
              <input id="subject" name="subject" type="text" required />
            </div>

            <div style="grid-column: 1 / -1;">
              <label for="message" style="color: var(--text); font-weight: 700;">Message</label><br />
              <textarea id="message" name="message" rows="6" required></textarea>
            </div>
          </div>

          <div style="margin-top: 16px;">
            <button class="btn" type="submit">Send Message</button>
          </div>
        </form>
      </div>
    </div>
  </section>

  <!-- FOOTER (same on every page) -->
  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Piano Portfolio • Built with HTML & CSS</p>
    </div>
  </footer>

</body>
</html>
